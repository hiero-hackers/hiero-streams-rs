name: Release

# Publishes the crate to crates.io AND the Node binding
# (@hiero-hackers/streams-node, prebuilt for 5 platforms) to the GitHub
# Packages npm registry. Publishing happens here in CI, auditably. The
# crates.io token lives ONLY as the org-owned `TOKEN_STREAMS_RS` repository
# secret (the crate itself is under LFDT custody — the lfdt-bot account owns
# it on crates.io); npm publishing uses the workflow's own GITHUB_TOKEN.
# Migrating crates.io auth to Trusted Publishing (OIDC, no standing secret)
# needs the crate OWNER to register this repo + workflow on the crate's
# Settings page — an LFDT request, not a repo-side change.
#
# To release: bump the version in Cargo.toml AND bindings/node/package.json
# (lockstep), merge to main, then push a matching tag
# (`git tag -s v0.1.0 && git push origin v0.1.0`). The tag push triggers
# this workflow. `workflow_dispatch` is a manual fallback.
#
# The crate and npm jobs are deliberately independent (no `needs` between
# them): each re-run publishes whichever half is still missing and fails
# cleanly on the half that already exists — no double-publish either way.
on:
    push:
        tags: ["v*.*.*"]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    publish:
        name: Publish to crates.io
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Install protoc
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            # A tag must match Cargo.toml's version — otherwise a mistaken
            # tag would publish the wrong version. (Skipped on manual runs.)
            - name: Tag matches crate version
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  crate=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
                  tag="${GITHUB_REF_NAME#v}"
                  if [ "$crate" != "$tag" ]; then
                      echo "::error::tag v$tag does not match Cargo.toml version $crate"
                      exit 1
                  fi
                  echo "publishing version $crate"

            # `--locked` publishes exactly the reviewed Cargo.lock. Re-running
            # after a version already exists fails cleanly (no double-publish).
            - name: Publish
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.TOKEN_STREAMS_RS }}
              run: cargo publish --locked

    # ── Node binding: build the native library on every supported platform.
    # Each runner compiles its own target (no cross-compilation to go wrong);
    # the publish job below gathers the artifacts into one npm package whose
    # generated index.js picks the right .node at require() time.
    npm-build:
        name: Binding (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-24.04-arm
                      target: linux-arm64-gnu
                    - os: macos-13
                      target: darwin-x64
                    - os: macos-latest
                      target: darwin-arm64
                    - os: windows-latest
                      target: win32-x64-msvc
                # linux-x64-gnu is built by the npm-publish job itself (it
                # must run `napi build` anyway to generate index.js/index.d.ts).
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Install protoc (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
            - name: Install protoc (macOS)
              if: runner.os == 'macOS'
              run: brew install protobuf
            - name: Install protoc (Windows)
              if: runner.os == 'Windows'
              run: choco install protoc --yes

            - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22

            - name: Build native binding
              working-directory: bindings/node
              run: npm ci && npm run build

            - name: Differential test on this platform
              working-directory: bindings/node
              run: npm test

            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: binding-${{ matrix.target }}
                  path: bindings/node/*.node
                  if-no-files-found: error

    npm-publish:
        name: Publish binding to GitHub Packages
        runs-on: ubuntu-latest
        needs: [npm-build]
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Install protoc
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
                  registry-url: https://npm.pkg.github.com

            # Tag must match the binding's version too — crate and binding
            # release in lockstep. (Skipped on manual runs.)
            - name: Tag matches binding version
              if: startsWith(github.ref, 'refs/tags/')
              working-directory: bindings/node
              run: |
                  pkg=$(node -p "require('./package.json').version")
                  tag="${GITHUB_REF_NAME#v}"
                  if [ "$pkg" != "$tag" ]; then
                      echo "::error::tag v$tag does not match bindings/node version $pkg"
                      exit 1
                  fi

            # Builds linux-x64-gnu natively — which also generates index.js
            # and index.d.ts — then runs the differential test against it.
            - name: Build linux-x64-gnu + JS loader
              working-directory: bindings/node
              run: npm ci && npm run build && npm test

            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  pattern: binding-*
                  path: bindings/node
                  merge-multiple: true

            - name: All five platform binaries present
              working-directory: bindings/node
              run: |
                  ls -l ./*.node
                  count=$(ls ./*.node | wc -l)
                  if [ "$count" -ne 5 ]; then
                      echo "::error::expected 5 .node binaries, found $count"
                      exit 1
                  fi

            - name: Publish
              working-directory: bindings/node
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npm publish
